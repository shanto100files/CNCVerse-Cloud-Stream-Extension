name: Build Extensions

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build all extensions
      run: ./gradlew assembleDebug --info 2>&1 | tail -50

    - name: Debug - Show build output structure
      run: |
        echo "=== Directory structure after build ==="
        find . -name "*.cs3" -type f 2>/dev/null || echo "No .cs3 files found anywhere"
        echo ""
        echo "=== Build outputs ==="
        find . -path "*/build/outputs/*" -type f 2>/dev/null | head -50 || echo "No build outputs"
        echo ""
        echo "=== All build directories ==="
        find . -name "build" -type d 2>/dev/null | head -20

    - name: Collect .cs3 files
      run: |
        mkdir -p cs3_files
        find . -name "*.cs3" -type f -exec cp {} cs3_files/ \;
        echo "Collected .cs3 files:"
        ls -la cs3_files/ || echo "No .cs3 files collected"

    - name: Checkout builds branch
      uses: actions/checkout@v4
      with:
        ref: builds
        path: builds_branch

    - name: Copy .cs3 files to builds branch
      run: |
        cd builds_branch
        rm -f *.cs3
        cd ..
        if ls cs3_files/*.cs3 1>/dev/null 2>&1; then
          cp cs3_files/*.cs3 builds_branch/
          echo "Updated .cs3 files:"
          ls -la builds_branch/*.cs3
        else
          echo "WARNING: No .cs3 files found, keeping existing files"
        fi

    - name: Update plugins.json URLs
      run: |
        cd builds_branch
        REPO_NAME="${{ github.repository }}"
        sed -i "s|NivinCNC/CNCVerse-Cloud-Stream-Extension|${REPO_NAME}|g" plugins.json
        sed -i "s|NivinCNC/CNCVerse-Cloud-Stream-Extension|${REPO_NAME}|g" CNC.json

    - name: Commit and push builds
      run: |
        cd builds_branch
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-build: Update .cs3 files from master"
          git push origin builds
        fi
