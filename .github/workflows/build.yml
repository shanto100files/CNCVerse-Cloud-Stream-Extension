name: Build Extensions

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build all extensions
      run: ./gradlew assembleDebug

    - name: Find all .cs3 files
      id: find_cs3
      run: |
        mkdir -p cs3_files
        find . -name "*.cs3" -exec cp {} cs3_files/ \;
        echo "Found .cs3 files:"
        ls -la cs3_files/

    - name: Checkout builds branch
      uses: actions/checkout@v4
      with:
        ref: builds
        path: builds_branch

    - name: Copy .cs3 files to builds branch
      run: |
        rm -f builds_branch/*.cs3
        cp cs3_files/*.cs3 builds_branch/
        echo "Updated .cs3 files:"
        ls -la builds_branch/*.cs3

    - name: Update plugins.json URLs
      run: |
        cd builds_branch
        REPO_NAME="${{ github.repository }}"
        sed -i "s|NivinCNC/CNCVerse-Cloud-Stream-Extension|${REPO_NAME}|g" plugins.json
        sed -i "s|NivinCNC/CNCVerse-Cloud-Stream-Extension|${REPO_NAME}|g" CNC.json

    - name: Commit and push builds
      run: |
        cd builds_branch
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-build: Update .cs3 files from master"
          git push origin builds
        fi
