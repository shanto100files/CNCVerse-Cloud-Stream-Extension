name: Build Extensions

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout master branch
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build all extensions
      run: ./gradlew assembleDebug

    - name: Collect .cs3 files
      run: |
        mkdir -p cs3_files
        find . -name "*.cs3" -type f -exec cp {} cs3_files/ \;
        if [ -z "$(ls cs3_files/*.cs3 2>/dev/null)" ]; then
          echo "No .cs3 files found, using full.jar as fallback"
          find . -path "*/full_jar/debug/createFullJarDebug/full.jar" -type f | while read jar; do
            dir=$(dirname "$jar")
            module=$(echo "$dir" | sed 's|.*/||' | head -1)
            parent=$(dirname "$dir" | xargs dirname | xargs dirname | xargs dirname | xargs dirname | xargs basename)
            cp "$jar" "cs3_files/${parent}.cs3"
          done
        fi
        echo "Collected files:"
        ls -la cs3_files/

    - name: Checkout builds branch
      uses: actions/checkout@v4
      with:
        ref: builds
        path: builds_branch

    - name: Copy .cs3 files to builds branch
      run: |
        cd builds_branch
        rm -f *.cs3
        cd ..
        if ls cs3_files/*.cs3 1>/dev/null 2>&1; then
          cp cs3_files/*.cs3 builds_branch/
          echo "Updated .cs3 files:"
          ls -la builds_branch/*.cs3
        else
          echo "No .cs3 files found, keeping existing"
        fi

    - name: Update plugins.json URLs
      run: |
        cd builds_branch
        REPO_NAME="${{ github.repository }}"
        sed -i "s|NivinCNC/CNCVerse-Cloud-Stream-Extension|${REPO_NAME}|g" plugins.json
        sed -i "s|NivinCNC/CNCVerse-Cloud-Stream-Extension|${REPO_NAME}|g" CNC.json

    - name: Commit and push builds
      run: |
        cd builds_branch
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-build: Update .cs3 files from master"
          git push origin builds
        fi
